<div class="relative w-36" libClickOutside (clickOutside)="close()">
  <!-- Trigger -->
  <button
    type="button"
    (click)="toggle()"
    class="flex w-full items-center gap-2 rounded-full border border-border bg-surface px-3 py-1.5 text-sm font-medium text-foreground transition-all hover:border-primary/50 hover:bg-surface-alt focus:outline-none"
  >
    <ng-container *ngComponentOutlet="currentFlagComponent()" />
    <span class="flex-1 truncate text-start">{{ currentLabel() }}</span>
  </button>

  <!-- Dropdown list -->
  @if (isOpen()) {
  <ul
    class="absolute inset-e-0 z-50 mt-1.5 w-44 overflow-hidden rounded-xl border border-border bg-surface shadow-xl animate-in fade-in-0 zoom-in-95 slide-in-from-top-2 duration-150"
  >
    @for (option of langOptions; track option.value) {
    <li>
      <button
        type="button"
        (click)="onSelect(option)"
        class="flex w-full items-center gap-3 px-4 py-2.5 text-sm transition-colors hover:bg-primary/10"
        [class.text-primary]="currentLang() === option.value"
        [class.font-semibold]="currentLang() === option.value"
      >
        <ng-container *ngComponentOutlet="option.flagComponent" />
        <span class="flex-1">{{ option.label }}</span>
        @if (currentLang() === option.value) {
        <lib-check-icon
          [width]="'16'"
          [height]="'16'"
          iconClass="text-primary"
        />
        }
      </button>
    </li>
    }
  </ul>
  }
</div>
