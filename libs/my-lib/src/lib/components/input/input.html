<div class="flex flex-col gap-1">
  @if (label()) {
  <label [for]="controlName()" class="text-sm font-medium text-foreground">
    {{ label() }}
  </label>
  }

  <input
    [id]="controlName()"
    [type]="type()"
    [formControlName]="controlName()"
    [placeholder]="placeholder()"
    [attr.min]="min() || null"
    [attr.max]="max() || null"
    class="w-full rounded-lg border px-3 py-2 text-sm outline-none transition-all bg-surface text-foreground border-border focus:border-primary focus:ring-2 focus:ring-primary/20 placeholder:text-subtle"
    [class.border-error]="hasError"
  />

  <lib-validation-error [control]="control" />
</div>
