<div
  [class]="'fixed inset-0 z-[10002] items-center justify-center ' + (modal().isOpen ? 'flex' : 'hidden')"
>
  <div
    libClickOutside
    (clickOutside)="closeModal()"
    class="relative min-w-[26rem] rounded-xl z-[10003] bg-background shadow-xl p-6"
  >
    @if (modal().hasCloseIcon) {
    <div class="flex justify-end mb-4">
      <lib-button
        id="btn-close-modal"
        variant="ghost"
        size="sm"
        aria-label="Close modal"
        (click)="closeModal()"
      >
        <lib-close-icon slot="start-icon" />
      </lib-button>
    </div>
    } @if (modal().title) {
    <h2 class="text-lg font-semibold text-foreground mb-1">
      {{ modal().title }}
    </h2>
    } @if (modal().description) {
    <p class="text-sm text-muted-foreground mb-4">{{ modal().description }}</p>
    } @if (modal().customizeContent) {
    <ng-container
      [ngTemplateOutlet]="modal().customizeContent!"
      [ngTemplateOutletContext]="{ $implicit: modal().data }"
    />
    }
  </div>
</div>

<div
  [class]="'fixed inset-0 bg-black/60 ' + (modal().isOpen ? 'block z-[10001]' : 'hidden')"
></div>
