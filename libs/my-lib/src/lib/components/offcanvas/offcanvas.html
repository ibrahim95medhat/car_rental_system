@if (isOpen()) {
<div class="fixed inset-0 z-10002 flex">
  <button
    type="button"
    class="absolute inset-0"
    [class]="overlayClass()"
    aria-label="Close offcanvas"
    (click)="closed.emit()"
  ></button>

  <div
    libClickOutside
    (clickOutside)="closed.emit()"
    [class]="panelClasses()"
    class="p-5 sm:p-6"
  >
    <div class="flex items-start justify-between gap-4">
      <div>
        @if (title()) {
        <h2 class="text-lg font-semibold text-foreground">{{ title() }}</h2>
        } @if (description()) {
        <p class="text-sm text-muted-foreground mt-1">{{ description() }}</p>
        }
      </div>

      @if (showCloseIcon()) {
      <lib-button
        variant="ghost"
        size="sm"
        aria-label="Close offcanvas"
        (click)="closed.emit()"
        (keydown.enter)="closed.emit()"
        (keydown.space)="closed.emit()"
      >
        <lib-close-icon slot="start-icon" />
      </lib-button>
      }
    </div>

    <div class="mt-5 flex-1 overflow-y-auto">
      <ng-content />
    </div>
  </div>
</div>
}
