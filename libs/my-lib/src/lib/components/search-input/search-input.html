<div class="relative w-full max-w-sm">
  <input
    type="text"
    [value]="value()"
    [placeholder]="placeholder() || ('SEARCH_PLACEHOLDER' | transloco)"
    (input)="onInput($event)"
    class="w-full rounded-md border border-border bg-background px-4 py-2 pe-10 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary"
  />
  <span
    class="absolute inset-y-0 inset-e-3 flex items-center pointer-events-none text-muted-foreground"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-4 w-4"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"
      />
    </svg>
  </span>
</div>
