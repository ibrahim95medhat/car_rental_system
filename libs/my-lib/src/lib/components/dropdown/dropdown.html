<div class="flex flex-col gap-1" libClickOutside (clickOutside)="close()">
  @if (label()) {
  <label [for]="controlName()" class="text-sm font-medium text-foreground">
    {{ label() }}
  </label>
  }

  <div class="relative">
    <lib-button
      type="button"
      variant="ghost"
      [id]="controlName()"
      (click)="toggle()"
      (keydown.enter)="toggle()"
      btnClass="!flex !w-full !justify-between !rounded-lg border !px-3 !py-2.5 !bg-surface hover:border-primary/50 focus:border-primary focus:!ring-primary/20 !ring-offset-0"
      [class.border-error]="hasError"
      [class.!ring-2]="hasError"
      [class.ring-error\/20]="hasError"
      [class.border-border]="!hasError"
      [class.!text-subtle]="!selectedLabel()"
    >
      <span class="truncate">{{ selectedLabel() ?? placeholder() }}</span>
      @if (showChevron()) {
      <span
        slot="end-icon"
        class="ml-2 shrink-0 transition-transform duration-200"
        [class.rotate-180]="isOpen()"
      >
        <lib-chevron-down-icon [width]="'16'" [height]="'16'" />
      </span>
      }
    </lib-button>

    @if (isOpen()) {
    <ul
      class="absolute z-50 mt-1.5 w-full overflow-auto rounded-lg border border-border bg-surface shadow-xl max-h-60 py-1 animate-in fade-in-0 zoom-in-95 slide-in-from-top-2 duration-150"
    >
      @for (option of options(); track option.value) {
      <li>
        <lib-button
          type="button"
          variant="ghost"
          [label]="option.label"
          [attr.aria-selected]="controlValue() === option.value"
          (click)="select(option)"
          (keydown.enter)="select(option)"
          (keydown.space)="select(option)"
          [btnClass]="controlValue() === option.value
            ? 'w-full justify-between text-start rounded-none px-3 py-2.5 text-sm bg-primary/10 text-primary font-medium'
            : 'w-full justify-between text-start rounded-none px-3 py-2.5 text-sm hover:bg-primary/10'"
        >
          @if (controlValue() === option.value) {
          <lib-check-icon
            slot="end-icon"
            [width]="'16'"
            [height]="'16'"
            iconClass="text-primary"
          />
          }
        </lib-button>
      </li>
      } @empty {
      <li class="flex items-center gap-2 px-3 py-3 text-sm text-subtle">
        No options available
      </li>
      }
    </ul>
    }
  </div>

  <lib-validation-error [control]="control" />
</div>
